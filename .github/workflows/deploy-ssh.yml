name: Deploy SSH

on:
  workflow_run:
    workflows:
      - Build
    types:
      - completed
  workflow_dispatch:
    inputs:
      build_run_id:
        description: 'ID del run de workflow Build (vacío = último exitoso en main)'
        required: false
        type: string

permissions:
  contents: read
  actions: read

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Resolve build run id
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id || '' }}
          INPUT_BUILD_RUN_ID: ${{ github.event.inputs.build_run_id || '' }}
        run: |
          if [ "$EVENT_NAME" = "workflow_run" ]; then
            echo "run_id=$WORKFLOW_RUN_ID" >> "$GITHUB_OUTPUT"
          elif [ -n "$INPUT_BUILD_RUN_ID" ]; then
            echo "run_id=$INPUT_BUILD_RUN_ID" >> "$GITHUB_OUTPUT"
          else
            RUN_ID=$(gh run list --workflow=build.yml --branch main --status success --limit 1 --json databaseId -q '.[0].databaseId')
            if [ "$RUN_ID" = "null" ] || [ -z "$RUN_ID" ]; then
              echo 'No se encontró un run exitoso de Build en main.'
              exit 1
            fi
            echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          fi

      - name: Download built assets
        uses: actions/download-artifact@v7
        with:
          name: public-build
          path: public/build
          run-id: ${{ steps.resolve.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Pull latest code
        run: |
          filter_motd() {
            awk 'done { print; next } /^#+$/ { skip = !skip; if (!skip) done=1; next } !skip'
          }
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no -o LogLevel=ERROR ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} /bin/bash --norc --noprofile -s << 'EOF' | filter_motd
            cd ${{ secrets.REPO_PATH }}
            git fetch origin
            git reset --hard origin/main
            git clean -fd
          EOF
          exit ${PIPESTATUS[0]}

      - name: Copy built assets to server
        run: |
          rsync -avz -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no -o LogLevel=ERROR" \
            public/build/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.REPO_PATH }}/public/build/

      - name: Run deployment commands
        run: |
          filter_motd() {
            awk 'done { print; next } /^#+$/ { skip = !skip; if (!skip) done=1; next } !skip'
          }
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no -o LogLevel=ERROR ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} /bin/bash --norc --noprofile -s << 'EOF' | filter_motd
            set -euo pipefail
            cd ${{ secrets.REPO_PATH }}
            PHP_BIN="/opt/alt/php84/usr/bin/php"
            COMPOSER_BIN="/opt/alt/php84/usr/bin/composer"

            "$COMPOSER_BIN" install --no-dev --optimize-autoloader --no-interaction
            "$PHP_BIN" artisan migrate --force --no-interaction

            if "$PHP_BIN" artisan migrate:status --no-interaction | grep -q 'Pending'; then
              echo "Error: quedan migraciones pendientes despues del deploy."
              exit 1
            fi

            "$PHP_BIN" artisan config:cache
            "$PHP_BIN" artisan route:cache
            "$PHP_BIN" artisan view:cache
          EOF
          exit ${PIPESTATUS[0]}
